# Railway 部署配置 — yiimui 專案
#
# 兩個 service 共用同一個 Docker image（backend/Dockerfile）：
#   - paint-web    → 預設跑 Dockerfile CMD = bash scripts/start_web.sh
#   - paint-worker → 用 env var RAILWAY_RUN_COMMAND = bash scripts/start_worker.sh 覆寫
#
# Plugin（在 Railway dashboard 加）：
#   - PostgreSQL（自動注入 DATABASE_URL）
#   - Redis（自動注入 REDIS_URL）

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
rootDirectory = "."

[deploy]
# 兩個 service 共用同一個 startCommand：dispatcher start.sh
# 它依 SERVICE_TYPE env var 分流：
#   paint-web    → Variables 設 SERVICE_TYPE=web    → 跑 start_web.sh    (uvicorn)
#   paint-worker → Variables 設 SERVICE_TYPE=worker → 跑 start_worker.sh (celery + healthcheck)
# 這樣 Railway dashboard "Custom Start Command" 欄位被綁定為 bash scripts/start.sh，
# 不需要任何 per-service 覆寫（不靠 RAILWAY_RUN_COMMAND 等 magic）。
startCommand = "bash scripts/start.sh"

# healthcheck **不寫**這裡 — 寫了會套到 paint-worker，worker 沒 HTTP 必失敗導致無限 restart。
# paint-worker 在容器內背景跑 healthcheck_server.py 開 port 給 Railway ping，
# paint-web 由 uvicorn 自己 listen PORT，兩邊都不需要 Railway-side 的 healthcheckPath。

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
