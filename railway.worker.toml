# Railway 配置 — paint-worker service
#
# paint-worker service 在 dashboard 設：
#   Settings → Source → Config Path = railway.worker.toml

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
rootDirectory = "."

[deploy]
startCommand = "bash scripts/start_worker.sh"

# Celery worker 沒有 HTTP，**不能**設 healthcheckPath（會被誤判 fail 觸發無限 restart）

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
